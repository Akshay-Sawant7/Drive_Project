name: Windows PyAutoGUI Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # NO pip install, NO python setup, NOTHING else

      - name: Run test1.py directly
        run: |
          echo "🚀 Running test1.py..."
          python test1.py
        shell: cmd

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: |
            *.png
            *.log
          if-no-files-found: ignore