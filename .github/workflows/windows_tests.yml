name: Windows PyAutoGUI Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ❌ REMOVE the setup-python step entirely
      # - uses: actions/setup-python@v5  ← DELETE THIS

      - name: Install dependencies
        run: |
          # Use the Python that's already on your system
          python -m pip install --upgrade pip
          pip install pyautogui opencv-python pillow
        shell: cmd  # Use cmd instead of PowerShell to avoid execution policy

      - name: List files
        run: |
          dir *.py
          dir *.png
        shell: cmd

      - name: Run PyAutoGUI test
        run: |
          echo "🚀 Starting Windows tests on self-hosted runner..."
          python test1.py  # Or test_linux.py - whatever your filename is
        shell: cmd

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: |
            *.png
            *.log
          if-no-files-found: ignore