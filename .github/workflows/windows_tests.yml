name: Windows PyAutoGUI Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: self-hosted  # Uses your existing runner

    steps:
      - uses: actions/checkout@v4

      # No setup-python needed - using your system Python
      - name: Run with Python 3.11
        run: |
          echo "🚀 Running with Python 3.11..."
          C:\Users\Akshay\AppData\Local\Programs\Python\Python311\python.exe test1.py
        shell: cmd

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: |
            *.png
            *.log
          if-no-files-found: ignore