name: Linux PyAutoGUI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            python3-tk \
            python3-dev \
            scrot \
            gnome-screenshot

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install pyautogui opencv-python pillow

      - name: List files
        run: |
          echo "=== Python Files ==="
          ls -la *.py
          echo "=== PNG Files ==="
          ls -la *.png

      - name: Run test_linux.py with xvfb
        run: |
          echo "🚀 Starting Linux PyAutoGUI tests..."
          echo ""
          xvfb-run -a -s "-screen 0 1920x1080x24" python test_linux.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-results
          path: |
            *.png
            *.log
          if-no-files-found: ignore

      - name: Test Summary
        if: always()
        run: |
          echo "## 🐧 Linux PyAutoGUI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| PNG Files | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Overall | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY