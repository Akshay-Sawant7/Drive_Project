name: Linux PyAutoGUI Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk scrot
          pip install pyautogui opencv-python pillow

      - name: Run tests with xvfb-run
        run: |
          xvfb-run -a -s "-screen 0 1920x1080x24" python test_linux.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            *.png
            *.log
          if-no-files-found: ignore