name: Linux PyAutoGUI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            python3-tk \
            python3-dev \
            scrot \
            gnome-screenshot \
            x11-utils \
            xdotool \
            imagemagick

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyautogui opencv-python pillow

      - name: List project files
        run: |
          echo "=== Python Files ==="
          ls -la *.py
          echo "=== PNG Files ==="
          ls -la *.png || echo "No PNG files found"

      - name: Run Linux test suite with Xvfb
        run: |
          # Start virtual display
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          
          # Give Xvfb time to start
          sleep 3
          
          # Verify display is working
          echo "Display: $DISPLAY"
          xdpyinfo | grep dimensions || echo "xdpyinfo not available"
          
          # Run the Linux test script
          echo "Starting Linux PyAutoGUI test suite..."
          python test_linux.py
          
          # Capture exit code
          EXIT_CODE=$?
          
          # Kill Xvfb
          pkill Xvfb || true
          
          exit $EXIT_CODE
        continue-on-error: true
        env:
          DISPLAY: :99
          PYTHONUNBUFFERED: 1

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-results
          path: |
            *.png
            *.log
          if-no-files-found: ignore

      - name: Create test summary
        if: always()
        run: |
          echo "## Linux PyAutoGUI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | Ubuntu Latest |" >> $GITHUB_STEP_SUMMARY
          echo "| **Display** | Xvfb (virtual) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resolution** | 1920x1080 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Python** | 3.11 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY