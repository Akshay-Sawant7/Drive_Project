name: PyAutoGUI Tests - Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyautogui opencv-python pillow

      - name: List files
        run: |
          Write-Host "=== Python Files ==="
          Get-ChildItem -Filter *.py
          Write-Host "=== PNG Files ==="
          Get-ChildItem -Filter *.png

      - name: Verify PNG files
        run: |
          $files = @('Ok.png', 'I_accept_the_agreement.png', 'Next.png', 'Install.png', 'Finish.png')
          $missing = @()
          foreach ($file in $files) {
            if (Test-Path $file) {
              Write-Host "✅ Found: $file"
            } else {
              Write-Host "❌ Missing: $file"
              $missing += $file
            }
          }
          if ($missing.Count -gt 0) {
            exit 1
          }

      - name: Run PyAutoGUI test
        run: python test1.py
        continue-on-error: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            *.png
            *.log
          if-no-files-found: ignore